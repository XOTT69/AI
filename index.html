<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Chat — Sync & Vision</title>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Markdown & DOMPurify для безпечного відображення коду та тексту -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

  <!-- Highlight.js для підсвітки синтаксису (за бажанням, можна додати плагін для marked, якщо потрібно) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  
  <!-- Твої стилі -->
  <link rel="stylesheet" href="/style.css">

  <script>
    // Підставляй сюди свої реальні ключі з Supabase (або зберігай у .env і прокидай через Vercel/збірку)
    window.NEXT_PUBLIC_SUPABASE_URL = "ТУТ_ТВІЙ_SUPABASE_URL";
    window.NEXT_PUBLIC_SUPABASE_ANON_KEY = "ТУТ_ТВІЙ_SUPABASE_ANON_KEY";
  </script>
</head>
<body>
  
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Мої Чати</h2>
      <button type="button" class="btn primary" id="newChatBtn">Новий чат</button>
    </div>

    <!-- Список чатів -->
    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-footer">
      <!-- Блок авторизації: коли користувач НЕ залогінений -->
      <div id="authLoggedOut" class="auth-section">
        <p class="auth-hint">Увійди для синхронізації:</p>
        <button type="button" class="btn" id="googleLoginBtn">Увійти через Google</button>
      </div>

      <!-- Блок авторизації: коли користувач залогінений -->
      <div id="authLoggedIn" class="auth-section hidden">
        <div class="user-info">
          <img id="userAvatar" src="https://placehold.co/40x40/png" alt="Avatar" class="avatar">
          <div class="user-details">
            <div id="userName" class="user-name">Користувач</div>
            <div id="userEmail" class="user-email">email@example.com</div>
          </div>
        </div>
        <div class="auth-actions">
          <button type="button" class="btn outline" id="syncBtn">Синхронізувати</button>
          <button type="button" class="btn danger" id="logoutBtn">Вийти</button>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <!-- Кнопка гамбургера для мобільних (якщо реалізовано в CSS) -->
      <button type="button" class="hamburger-btn" id="hamburgerBtn" onclick="document.getElementById('sidebar').classList.add('open'); document.getElementById('mobileOverlay').classList.add('show'); document.body.classList.add('no-scroll');">
        ☰
      </button>

      <div class="chat-header-info">
        <h3 id="chatTitle">Новий чат</h3>
        <span class="status-indicator" id="statusText">Завантаження...</span>
      </div>
      
      <div class="topbar-controls">
        <select id="model" class="control-btn">
          <option value="deepseek-ai/deepseek-v4-flash">DeepSeek Flash (Швидкий)</option>
          <option value="deepseek-ai/deepseek-v4-pro">DeepSeek Pro (Універсал)</option>
          <option value="google/gemma-3-27b-it">Gemma 3 27B (Фото і OCR)</option>
          <option value="abacusai/dracarys-llama-3.1-70b-instruct">Dracarys Llama 70B (Код)</option>
        </select>

        <div class="mode-toggles">
          <button type="button" class="btn small active" id="fastModeBtn">Швидко</button>
          <button type="button" class="btn small" id="smartModeBtn">Розумно</button>
        </div>

        <label class="checkbox-label" title="Deep thinking для складних задач">
          <input type="checkbox" id="thinking"> Глибоке мислення
        </label>

        <!-- Експорт та очищення (Quick Actions) -->
        <div class="dropdown">
          <button type="button" class="btn icon-btn" title="Опції чату">⋮</button>
          <div class="dropdown-menu dropdown-right">
            <button type="button" id="exportJsonBtn">Експорт в JSON</button>
            <button type="button" id="exportMdBtn">Експорт в Markdown</button>
            <hr>
            <button type="button" id="clearBtn" class="danger">Очистити чат</button>
          </div>
        </div>
      </div>
    </header>

    <div class="chat-container" id="chat">
      <div class="chat-empty">Ініціалізація...</div>
    </div>

    <div class="input-area">
      <!-- Бар для прикріпленого фото -->
      <div class="selected-image-bar hidden" id="selectedImageBar">
        <img id="selectedImagePreview" src="" alt="preview">
        <div class="image-info">
          <span id="selectedImageName">image.jpg</span>
          <small id="selectedImageHint">Фото прикріплене.</small>
        </div>
        <button type="button" class="btn-icon danger" id="removeImageBtn" title="Видалити">✕</button>
      </div>

      <form id="chatForm" class="input-form">
        <!-- Прихований інпут для файлів -->
        <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp" class="hidden">
        
        <!-- Кнопки зліва від поля вводу -->
        <div class="input-actions-left">
          <button type="button" class="btn-icon" id="imageBtn" title="Прикріпити фото">
            🖼️
          </button>
        </div>

        <textarea 
          id="prompt" 
          placeholder="Напиши повідомлення... (Shift+Enter для нового рядка)" 
          rows="1" 
          autofocus
        ></textarea>
        
        <!-- Кнопки справа від поля вводу -->
        <div class="input-actions-right">
          <button type="button" class="btn-icon danger" id="stopBtn" title="Зупинити генерацію" disabled>
            ⏹
          </button>
          <button type="submit" class="btn primary" id="sendBtn">
            ➤
          </button>
        </div>
      </form>
    </div>
  </main>

<script src="/config.js"></script>
<script src="/app.js"></script>
</body>
</html>
