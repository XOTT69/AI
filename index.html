<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Chat BY Антон</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
  />
</head>
<body>
  <div id="mobileOverlay" class="mobile-overlay"></div>

  <div class="app-frame">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <div>
          <h2>Чати</h2>
          <div class="sidebar-subtitle">Supabase sync v2</div>
        </div>
        <button id="closeSidebarBtn" type="button" class="icon-btn mobile-only" aria-label="Закрити меню">✕</button>
      </div>

      <button id="newChatBtn" type="button" class="primary-btn full-btn">+ Новий чат</button>

      <div class="sidebar-card compact-card">
        <button id="profileToggleBtn" type="button" class="section-toggle">
          <span>Профіль</span>
          <span id="profileToggleIcon">−</span>
        </button>

        <div id="profileSection">
          <div class="auth-card no-card">
            <div id="authLoggedOut">
              <div class="sidebar-label">Авторизація</div>
              <button id="googleLoginBtn" type="button" class="primary-btn full-btn">Увійти через Google</button>
            </div>

            <div id="authLoggedIn" class="hidden">
              <button id="profileMenuBtn" type="button" class="profile-card">
                <img id="userAvatar" class="user-avatar" alt="avatar" />
                <div class="user-meta">
                  <strong id="userName">Користувач</strong>
                  <span id="userEmail">email@example.com</span>
                </div>
                <span class="profile-arrow">›</span>
              </button>

              <div class="profile-actions compact-actions">
                <button id="syncBtn" type="button" class="ghost-btn full-btn">Синхронізувати</button>
                <button id="logoutBtn" type="button" class="ghost-btn full-btn danger-btn">Вийти</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="sidebar-card compact-card">
        <button id="quickActionsToggleBtn" type="button" class="section-toggle">
          <span>Швидкі дії</span>
          <span id="quickActionsToggleIcon">+</span>
        </button>

        <div id="quickActionsSection" class="hidden">
          <div class="stack-actions compact-actions">
            <button id="exportJsonBtn" type="button" class="ghost-btn full-btn">Експорт JSON</button>
            <button id="exportMdBtn" type="button" class="ghost-btn full-btn">Експорт MD</button>
          </div>
        </div>
      </div>

      <div class="sidebar-card compact-card">
        <button id="historyToggleBtn" type="button" class="section-toggle">
          <span>Історія чатів</span>
          <span id="historyToggleIcon">−</span>
        </button>

        <div id="historySection">
          <div id="chatList" class="chat-list compact-list"></div>
        </div>
      </div>
    </aside>

    <main class="main-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button id="openSidebarBtn" type="button" class="icon-btn mobile-only" aria-label="Відкрити меню">☰</button>
          <div>
            <h1>AI Chat BY Антон</h1>
            <p id="chatTitle">Новий чат</p>
          </div>
        </div>

        <div class="topbar-right">
          <div class="status-pill">
            <span class="status-dot"></span>
            <span id="statusText">Готово</span>
          </div>
          <button id="clearBtn" type="button" class="ghost-btn desktop-only">Очистити чат</button>
        </div>
      </header>

      <section id="chat" class="chat"></section>

      <div id="selectedImageBar" class="selected-image-bar hidden">
        <div class="selected-image-left">
          <img id="selectedImagePreview" alt="preview" />
          <div class="selected-image-meta">
            <strong id="selectedImageName">Фото не вибрано</strong>
            <span id="selectedImageHint">Фото буде відправлено разом із наступним повідомленням.</span>
          </div>
        </div>
        <button type="button" id="removeImageBtn" class="ghost-btn small-btn">Прибрати</button>
      </div>

      <form id="chatForm" class="composer">
        <div class="composer-box">
          <textarea
            id="prompt"
            placeholder="Напиши повідомлення або опиши, яке зображення згенерувати..."
            rows="1"
            required
          ></textarea>

          <div class="composer-bottom">
            <div class="composer-tools">
              <button type="button" id="imageBtn" class="ghost-btn round-btn">Фото</button>
              <button type="button" id="generateImageBtn" class="ghost-btn hide-mobile">Згенерувати фото</button>

              <div class="select-wrap hide-mobile">
                <select id="model">
                  <option value="deepseek-ai/deepseek-v4-pro" selected>DeepSeek V4 Pro</option>
                  <option value="z-ai/glm-5.1">GLM-5.1</option>
                  <option value="deepseek-ai/deepseek-v4-flash">DeepSeek V4 Flash</option>
                  <option value="meta/llama-3.2-11b-vision-instruct">Llama 3.2 Vision</option>
                </select>
              </div>

              <label class="toggle hide-mobile">
                <input type="checkbox" id="thinking" />
                <span>Thinking</span>
              </label>

              <div class="mode-switch hide-mobile">
                <button type="button" id="fastModeBtn" class="mode-btn active">Швидко</button>
                <button type="button" id="smartModeBtn" class="mode-btn">Розумно</button>
              </div>
            </div>

            <div class="composer-actions">
              <button type="button" id="stopBtn" class="ghost-btn danger-btn hide-mobile" disabled>Стоп</button>
              <button type="submit" id="sendBtn" class="send-btn" aria-label="Надіслати">↑</button>
            </div>
          </div>
        </div>
      </form>
    </main>
  </div>

  <input type="file" id="imageInput" accept="image/*" hidden />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.6/purify.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>

  <script>
    const sidebar = document.getElementById("sidebar");
    const mobileOverlay = document.getElementById("mobileOverlay");
    const openSidebarBtn = document.getElementById("openSidebarBtn");
    const closeSidebarBtn = document.getElementById("closeSidebarBtn");

    const profileToggleBtn = document.getElementById("profileToggleBtn");
    const profileSection = document.getElementById("profileSection");
    const profileToggleIcon = document.getElementById("profileToggleIcon");

    const quickActionsToggleBtn = document.getElementById("quickActionsToggleBtn");
    const quickActionsSection = document.getElementById("quickActionsSection");
    const quickActionsToggleIcon = document.getElementById("quickActionsToggleIcon");

    const historyToggleBtn = document.getElementById("historyToggleBtn");
    const historySection = document.getElementById("historySection");
    const historyToggleIcon = document.getElementById("historyToggleIcon");

    function openSidebar() {
      sidebar.classList.add("open");
      mobileOverlay.classList.add("show");
      document.body.classList.add("no-scroll");
    }

    function closeSidebar() {
      sidebar.classList.remove("open");
      mobileOverlay.classList.remove("show");
      document.body.classList.remove("no-scroll");
    }

    function toggleSection(section, icon) {
      section.classList.toggle("hidden");
      icon.textContent = section.classList.contains("hidden") ? "+" : "−";
    }

    if (openSidebarBtn) openSidebarBtn.addEventListener("click", openSidebar);
    if (closeSidebarBtn) closeSidebarBtn.addEventListener("click", closeSidebar);
    if (mobileOverlay) mobileOverlay.addEventListener("click", closeSidebar);

    if (profileToggleBtn) {
      profileToggleBtn.addEventListener("click", () => toggleSection(profileSection, profileToggleIcon));
    }

    if (quickActionsToggleBtn) {
      quickActionsToggleBtn.addEventListener("click", () => toggleSection(quickActionsSection, quickActionsToggleIcon));
    }

    if (historyToggleBtn) {
      historyToggleBtn.addEventListener("click", () => toggleSection(historySection, historyToggleIcon));
    }

    window.addEventListener("resize", () => {
      if (window.innerWidth > 960) closeSidebar();
    });
  </script>
</body>
</html>
