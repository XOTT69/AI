<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>AI Chat v2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --font-body: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-display: "Inter", system-ui, sans-serif;

      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.375rem);
      --text-xl: clamp(1.35rem, 1.15rem + 0.9vw, 1.9rem);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --radius-sm: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.25rem;
      --radius-full: 9999px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);

      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-surface-offset: #23211f;
      --color-surface-dynamic: #2c2a28;
      --color-border: #393836;
      --color-divider: #2a2927;
      --color-text: #ece9e3;
      --color-text-muted: #a6a39d;
      --color-text-faint: #76726d;
      --color-text-inverse: #141311;
      --color-primary: #58a6b2;
      --color-primary-hover: #6db6c1;
      --color-primary-active: #3d8691;
      --color-primary-highlight: #27393c;
      --color-success: #66a147;
      --color-error: #c75e97;

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.18);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.22);
      --shadow-lg: 0 18px 40px rgba(0, 0, 0, 0.28);

      --app-height: 100dvh;
      --sidebar-width: 312px;
      --composer-max: 980px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
    }

    body {
      min-height: var(--app-height);
      font-size: var(--text-base);
      line-height: 1.55;
    }

    button, input, textarea, select {
      font: inherit;
      color: inherit;
      border: 0;
      outline: 0;
      background: none;
    }

    button {
      cursor: pointer;
      transition:
        background var(--transition-interactive),
        color var(--transition-interactive),
        border-color var(--transition-interactive),
        opacity var(--transition-interactive),
        transform var(--transition-interactive),
        box-shadow var(--transition-interactive);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img, svg {
      display: block;
      max-width: 100%;
    }

    .hidden { display: none !important; }
    .no-scroll { overflow: hidden; }

    .app-shell {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(88, 166, 178, 0.08), transparent 28%),
        var(--color-bg);
    }

    .sidebar {
      border-right: 1px solid rgba(255,255,255,0.08);
      background: rgba(22, 21, 19, 0.92);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
      z-index: 40;
    }

    .sidebar-top {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      justify-content: space-between;
      padding: max(env(safe-area-inset-top), 14px) var(--space-4) var(--space-4);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(88,166,178,0.18), rgba(88,166,178,0.06));
      border: 1px solid rgba(88,166,178,0.22);
      color: var(--color-primary);
      flex: 0 0 auto;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-subtitle {
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      margin-top: 2px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 12px;
      display: inline-grid;
      place-items: center;
      color: var(--color-text-muted);
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .icon-btn:hover {
      color: var(--color-text);
      background: rgba(255,255,255,0.06);
    }

    .sidebar-actions {
      display: grid;
      gap: var(--space-3);
      padding: var(--space-4);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .primary-btn,
    .secondary-btn,
    .ghost-btn {
      min-height: 46px;
      padding: 0 var(--space-4);
      border-radius: 14px;
      font-size: var(--text-sm);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .primary-btn {
      background: var(--color-primary);
      color: #0f1617;
      box-shadow: 0 8px 24px rgba(88,166,178,0.18);
    }

    .primary-btn:hover { background: var(--color-primary-hover); }
    .primary-btn:active { background: var(--color-primary-active); transform: translateY(1px); }

    .secondary-btn {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--color-text);
    }

    .secondary-btn:hover {
      background: rgba(255,255,255,0.07);
    }

    .ghost-btn {
      background: transparent;
      color: var(--color-text-muted);
      border: 1px dashed rgba(255,255,255,0.08);
    }

    .ghost-btn:hover {
      color: var(--color-text);
      background: rgba(255,255,255,0.04);
    }

    .sidebar-section-title {
      padding: 0 var(--space-4) var(--space-2);
      color: var(--color-text-faint);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 0 var(--space-3) var(--space-4);
    }

    .chat-item {
      width: 100%;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      border: 1px solid transparent;
      background: transparent;
    }

    .chat-item:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.05);
    }

    .chat-item.active {
      background: rgba(88,166,178,0.09);
      border-color: rgba(88,166,178,0.22);
    }

    .chat-item-main {
      min-width: 0;
      flex: 1;
      text-align: left;
    }

    .chat-item-title {
      font-size: var(--text-sm);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-subtitle {
      margin-top: 4px;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      line-height: 1.35;
    }

    .chat-item-delete {
      width: 34px;
      height: 34px;
      min-width: 34px;
      border-radius: 10px;
      color: var(--color-text-faint);
      background: rgba(255,255,255,0.03);
    }

    .chat-item-delete:hover {
      color: #fff;
      background: rgba(199,94,151,0.18);
    }

    .sidebar-auth {
      padding: var(--space-4);
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }

    .auth-card {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      padding: 14px;
    }

    .auth-user {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .auth-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255,255,255,0.05);
    }

    .auth-meta {
      min-width: 0;
      flex: 1;
    }

    .auth-name {
      font-size: var(--text-sm);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .auth-email {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .auth-actions {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .main-panel {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100dvh;
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding:
        max(env(safe-area-inset-top), 12px)
        clamp(14px, 2vw, 22px)
        14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(23,22,20,0.78);
      backdrop-filter: blur(14px);
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .topbar-title-wrap {
      min-width: 0;
    }

    .topbar-title {
      font-size: var(--text-lg);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-subtitle {
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      margin-top: 2px;
    }

    .model-select {
      min-height: 42px;
      min-width: 170px;
      border-radius: 12px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }

    .status-chip {
      min-height: 34px;
      padding: 0 12px;
      border-radius: var(--radius-full);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .chat {
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 18px clamp(14px, 2vw, 22px) 0;
      scroll-behavior: smooth;
      content-visibility: auto;
    }

    .chat-inner {
      width: min(100%, 960px);
      margin: 0 auto;
      padding-bottom: 28px;
    }

    .chat-empty {
      min-height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--color-text-muted);
      padding: 32px 16px;
      font-size: var(--text-base);
    }

    .message-wrapper {
      display: flex;
      margin-bottom: 16px;
    }

    .message-wrapper.user {
      justify-content: flex-end;
    }

    .message-wrapper.assistant,
    .message-wrapper.system {
      justify-content: flex-start;
    }

    .message-content {
      width: min(100%, 820px);
      border-radius: 20px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow-wrap: anywhere;
      box-shadow: var(--shadow-sm);
    }

    .message-wrapper.user .message-content {
      background: rgba(88,166,178,0.12);
      border-color: rgba(88,166,178,0.2);
    }

    .message-wrapper.assistant .message-content {
      background: rgba(255,255,255,0.04);
    }

    .message-content p + p { margin-top: 0.8em; }
    .message-content ul,
    .message-content ol { padding-left: 1.2em; margin-top: 0.8em; }
    .message-content li + li { margin-top: 0.3em; }
    .message-content pre {
      margin-top: 0.9em;
      overflow-x: auto;
      border-radius: 14px;
      padding: 14px;
      background: #11100f;
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
    }

    .message-content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .message-content pre code {
      background: transparent;
      padding: 0;
    }

    .message-content :not(pre) > code {
      background: rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 0.1em 0.45em;
      font-size: 0.95em;
    }

    .message-attachments {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .attachment-card {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      max-width: 420px;
    }

    .attachment-card img {
      width: 100%;
      height: auto;
      max-height: 380px;
      object-fit: cover;
      background: rgba(255,255,255,0.04);
    }

    .attachment-meta {
      padding: 10px 12px;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .composer-wrap {
      position: sticky;
      bottom: 0;
      z-index: 25;
      padding:
        10px
        clamp(10px, 2vw, 18px)
        calc(max(env(safe-area-inset-bottom), 10px) + 10px);
      background:
        linear-gradient(to top, rgba(23,22,20,0.97), rgba(23,22,20,0.84), rgba(23,22,20,0.4), transparent);
      backdrop-filter: blur(10px);
    }

    .composer-shell {
      width: min(100%, var(--composer-max));
      margin: 0 auto;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(28,27,25,0.92);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .selected-image-bar {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .selected-image-preview {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      object-fit: cover;
      background: rgba(255,255,255,0.04);
      flex: 0 0 auto;
    }

    .selected-image-meta {
      min-width: 0;
      flex: 1;
    }

    .selected-image-label {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .selected-image-name {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .composer-form {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .composer-textarea {
      width: 100%;
      min-height: 64px;
      max-height: 220px;
      resize: none;
      overflow-y: auto;
      background: transparent;
      color: var(--color-text);
      font-size: var(--text-base);
      line-height: 1.55;
      padding: 4px 2px;
    }

    .composer-textarea::placeholder {
      color: var(--color-text-faint);
    }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .composer-left,
    .composer-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill-btn {
      min-height: 42px;
      padding: 0 14px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.04);
      color: var(--color-text-muted);
      border: 1px solid rgba(255,255,255,0.08);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .pill-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--color-text);
    }

    .send-btn {
      min-width: 116px;
    }

    .error-card {
      border-radius: 16px;
      background: rgba(199,94,151,0.08);
      border: 1px solid rgba(199,94,151,0.2);
      color: #f0d9e6;
      padding: 14px;
    }

    .error-actions {
      margin-top: 10px;
    }

    .thought-block {
      margin-top: 12px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .thought-block summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text-muted);
    }

    .thought-content {
      padding: 0 12px 12px;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }

    .mobile-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.48);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-interactive);
      z-index: 35;
    }

    .mobile-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .desktop-only { display: inline-grid; }
    .mobile-only { display: none; }

    @media (max-width: 1024px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(88vw, 340px);
        max-width: 340px;
        transform: translateX(-100%);
        transition: transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: var(--shadow-lg);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .desktop-only { display: none; }
      .mobile-only { display: inline-grid; }
    }

    @media (max-width: 768px) {
      .topbar {
        padding-inline: 12px;
      }

      .topbar-title {
        font-size: 1.05rem;
      }

      .topbar-subtitle {
        display: none;
      }

      .topbar-right {
        gap: 8px;
      }

      .model-select {
        min-width: 0;
        width: 138px;
        font-size: 14px;
      }

      .chat {
        padding-inline: 10px;
      }

      .chat-inner {
        padding-bottom: 18px;
      }

      .message-content {
        width: min(100%, 100%);
        padding: 12px 13px;
        border-radius: 18px;
      }

      .composer-wrap {
        padding-inline: 10px;
      }

      .composer-shell {
        border-radius: 22px;
      }

      .composer-form {
        padding: 10px;
      }

      .composer-textarea {
        min-height: 52px;
        font-size: 16px;
      }

      .composer-actions {
        align-items: stretch;
      }

      .composer-left,
      .composer-right {
        width: 100%;
        justify-content: space-between;
      }

      .pill-btn,
      .send-btn {
        min-height: 44px;
      }

      .status-chip {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .topbar-right .model-select {
        width: 122px;
        padding-inline: 10px;
      }

      .brand-title {
        font-size: 14px;
      }

      .auth-card {
        padding: 12px;
      }

      .selected-image-preview {
        width: 46px;
        height: 46px;
      }

      .attachment-card {
        max-width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-label="AI logo">
              <path d="M6 18L12 6L18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8.5 13.5H15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="brand-text">
            <div class="brand-title">AI Chat v2</div>
            <div class="brand-subtitle">Швидко, стабільно, з історією</div>
          </div>
        </div>

        <button class="icon-btn mobile-only" id="closeSidebarBtn" aria-label="Закрити меню">
          ✕
        </button>
      </div>

      <div class="sidebar-actions">
        <button class="primary-btn" id="newChatBtn">Новий чат</button>
      </div>

      <div class="sidebar-section-title">Історія</div>
      <div class="chat-list" id="chatList"></div>

      <div class="sidebar-auth">
        <div class="auth-card">
          <div id="authLoggedOut">
            <button class="primary-btn" id="googleLoginBtn">Увійти через Google</button>
          </div>

          <div id="authLoggedIn" class="hidden">
            <div class="auth-user">
              <img class="auth-avatar" id="userAvatar" alt="Avatar" />
              <div class="auth-meta">
                <div class="auth-name" id="userName">User</div>
                <div class="auth-email" id="userEmail"></div>
              </div>
            </div>
            <div class="auth-actions">
              <button class="secondary-btn" id="logoutBtn">Вийти</button>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn mobile-only" id="hamburgerBtn" aria-label="Відкрити меню">☰</button>
          <div class="topbar-title-wrap">
            <div class="topbar-title" id="currentChatTitle">Новий чат</div>
            <div class="topbar-subtitle">Історія, моделі, фото і стабільна мобільна верстка</div>
          </div>
        </div>

        <div class="topbar-right">
          <div class="status-chip hidden" id="statusText"></div>
          <select class="model-select" id="model" aria-label="Вибір моделі">
            <option value="auto">Auto</option>
            <option value="github/gpt-4o-mini">GPT-4o mini</option>
            <option value="groq/llama-3.3-70b-versatile">Groq Llama 3.3 70B</option>
            <option value="gemini/gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="mistral/codestral">Codestral</option>
            <option value="mistral/mistral-large">Mistral Large</option>
            <option value="meta/llama-3.3-70b-instruct">Meta Llama 3.3 70B</option>
            <option value="google/gemma-3-27b-it">Gemma 3 27B</option>
            <option value="meta/llama-3.2-90b-vision-instruct">Llama 3.2 Vision</option>
            <option value="cerebras/llama-3.1-70b">Cerebras Llama 3.1 70B</option>
            <option value="github/phi-4">Phi-4</option>
          </select>
        </div>
      </header>

      <section class="chat" id="chat">
        <div class="chat-inner"></div>
      </section>

      <div class="composer-wrap">
        <div class="composer-shell">
          <div class="selected-image-bar hidden" id="selectedImageBar">
            <img class="selected-image-preview" id="selectedImagePreview" alt="Selected image preview" />
            <div class="selected-image-meta">
              <div class="selected-image-label">Фото</div>
              <div class="selected-image-name" id="selectedImageName"></div>
            </div>
            <button class="icon-btn" id="removeImageBtn" aria-label="Прибрати фото">✕</button>
          </div>

          <form class="composer-form" id="chatForm">
            <textarea
              id="prompt"
              class="composer-textarea"
              placeholder="Напиши повідомлення..."
              rows="1"
              autocomplete="off"
            ></textarea>

            <div class="composer-actions">
              <div class="composer-left">
                <input id="imageInput" type="file" accept="image/*" class="hidden" />
                <button class="pill-btn" type="button" id="imageBtn">Фото</button>
                <button class="pill-btn" type="button" id="clearBtn">Очистити</button>
              </div>

              <div class="composer-right">
                <button class="pill-btn hidden" type="button" id="stopBtn">Стоп</button>
                <button class="primary-btn send-btn" type="submit" id="sendBtn">Надіслати</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
