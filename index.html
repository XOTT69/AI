<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>AI Chat</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) registration.unregister();
      });
    }
  </script>

  <style>
    :root {
      --bg: #212121;
      --sidebar: #171717;
      --panel: #2f2f2f;
      --panel-hover: #3a3a3a;
      --text: #ececec;
      --muted: #b4b4b4;
      --accent: #10a37f;
      --danger-bg: rgba(239,68,68,0.15);
      --danger-text: #f87171;
      --border: rgba(255,255,255,0.1);
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --sidebar: #f9f9f9;
      --panel: #f4f4f4;
      --panel-hover: #e5e5e5;
      --text: #0d0d0d;
      --muted: #666666;
      --accent: #10a37f;
      --danger-bg: rgba(239,68,68,0.1);
      --danger-text: #dc2626;
      --border: rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; }
    
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100%;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      transition: background 0.3s, color 0.3s;
    }

    .app-container { display: flex; height: 100%; width: 100%; }

    .sidebar {
      width: 260px;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2000;
      padding-top: env(safe-area-inset-top, 0px);
    }

    .sidebar-header { padding: 12px; display: flex; gap: 8px; align-items: center; }

    .btn-new-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-new-chat:hover { background: var(--panel); }

    .theme-btn {
      width: 40px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .theme-btn:hover { background: var(--panel); }

    .chat-list { flex: 1; overflow-y: auto; padding: 8px; }

    .chat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      border: none;
      font-size: 14px;
    }

    .chat-item:hover { background: var(--panel); }
    .chat-item.active { background: var(--panel); font-weight: 500; }

    .chat-item-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-delete {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: none;
      font-size: 12px;
    }

    .chat-item:hover .chat-item-delete { display: block; }

    .chat-item-delete:hover {
      color: var(--danger-text);
      background: var(--danger-bg);
    }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .user-info img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .user-details { overflow: hidden; }

    .user-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .user-email {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .btn {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
    }

    .btn:hover { background: var(--panel-hover); }

    .btn.danger {
      color: var(--danger-text);
      border-color: var(--danger-bg);
      background: transparent;
    }

    .btn.danger:hover { background: var(--danger-bg); }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
      height: 100%;
    }
    
    .topbar {
      flex-shrink: 0;
      padding: calc(10px + env(safe-area-inset-top, 0px)) 16px 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .hamburger-btn {
      display: none;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 24px;
      padding: 4px;
      cursor: pointer;
      margin-left: -4px;
    }
    
    .model-select {
      background: transparent;
      color: var(--muted);
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      appearance: none;
    }

    .model-select option {
      background: var(--bg);
      color: var(--text);
    }

    .status-indicator {
      color: var(--muted);
      font-size: 12px;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 20px;
    }

    .chat-empty {
      margin: auto;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }
    
    .message-wrapper {
      width: 100%;
      max-width: 800px;
      padding: 16px;
      display: flex;
    }

    .message-wrapper.user { justify-content: flex-end; }
    .message-wrapper.assistant { justify-content: flex-start; }

    .message-content {
      font-size: 15px;
      line-height: 1.6;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .message-wrapper.user .message-content {
      background: var(--panel);
      padding: 12px 18px;
      border-radius: 20px;
      max-width: 85%;
    }

    .message-wrapper.assistant .message-content {
      width: 100%;
      padding-right: 16px;
    }

    .message-content p { margin: 0 0 16px 0; }
    .message-content p:last-child { margin: 0; }

    .inline-preview-image {
      max-width: 100%;
      max-height: 400px;
      border-radius: 12px;
      margin-top: 8px;
      object-fit: contain;
    }

    .thought-block {
      background: transparent;
      border-left: 2px solid var(--border);
      padding-left: 14px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--muted);
    }

    .thought-block summary {
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      outline: none;
    }

    .thought-block summary::-webkit-details-marker { display: none; }
    .thought-block summary::before {
      content: '▶';
      font-size: 10px;
      transition: transform 0.2s;
    }

    .thought-block[open] summary::before { transform: rotate(90deg); }
    .thought-content { margin-top: 12px; }

    .code-block {
      position: relative;
      margin: 16px 0;
      border-radius: 8px;
      overflow: hidden;
      background: #0d1117;
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #161b22;
      padding: 6px 12px;
      font-size: 12px;
      color: #8b949e;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .copy-btn {
      background: transparent;
      border: none;
      color: #8b949e;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      transition: color 0.2s;
    }

    .copy-btn:hover { color: #fff; }

    .code-block pre {
      margin: 0;
      padding: 16px;
      overflow-x: auto;
      color: #c9d1d9;
      font-size: 14px;
    }

    .input-container {
      flex-shrink: 0;
      width: 100%;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px)) 16px;
      z-index: 100;
    }
    
    .input-wrapper-inner {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .selected-image-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: var(--panel);
      border-radius: 12px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    .selected-image-bar img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: cover;
    }

    .image-info { flex: 1; }
    .image-info span { display: block; font-size: 14px; }
    
    .input-form {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 6px 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    [data-theme="light"] .input-form {
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .btn-icon {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 20px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }

    .btn-icon:hover {
      background: var(--panel-hover);
      color: var(--text);
    }
    
    .input-form textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      resize: none;
      padding: 8px 0;
      max-height: 150px;
      outline: none;
    }

    .input-form textarea::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 2px;
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .hidden { display: none !important; }

    .mobile-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .mobile-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,0.5);
      }
      .sidebar.open { transform: translateX(0); }
      .hamburger-btn { display: block; }
      .message-wrapper.user .message-content { max-width: 92%; }
      .chat-item-delete { display: block; }
    }
  </style>
</head>
<body>
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button type="button" class="btn-new-chat" id="newChatBtn">
          <span>Новий чат</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button type="button" class="theme-btn" id="themeToggleBtn">☀️</button>
      </div>

      <div class="chat-list" id="chatList"></div>

      <div class="sidebar-footer">
        <div id="authLoggedOut">
          <button type="button" class="btn" id="googleLoginBtn">Увійти (Google)</button>
        </div>
        <div id="authLoggedIn" class="hidden">
          <div class="user-info">
            <img id="userAvatar" src="https://placehold.co/40x40/png" alt="Avatar">
            <div class="user-details">
              <div id="userName" class="user-name">Користувач</div>
              <div id="userEmail" class="user-email">email@example.com</div>
            </div>
          </div>
          <button type="button" class="btn danger" id="logoutBtn">Вийти</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="hamburger-btn" id="hamburgerBtn">☰</button>
          <select id="model" class="model-select">
            <option value="groq/llama-3.3-70b-versatile">Llama 3.3 70B (Groq)</option>
            <option value="gemini/gemini-2.5-flash">Gemini 2.5 Flash (+Фото)</option>
            <option value="meta/llama-3.3-70b-instruct">Llama 3.3 70B</option>
            <option value="qwen/qwen3.5-122b-a10b">Qwen 3.5 122B</option>
            <option value="google/gemma-3-27b-it">Gemma 3 (+Фото)</option>
            <option value="meta/llama-3.2-90b-vision-instruct">Llama 3.2 90B Vision (+Фото)</option>
          </select>
          <span class="status-indicator hidden" id="statusText">Готово</span>
        </div>
        <button type="button" class="btn-icon" id="clearBtn" title="Очистити чат" style="width: 32px; height: 32px; color: var(--danger-text);">🗑️</button>
      </header>

      <div class="chat-container" id="chat">
        <div class="chat-empty">Чим можу допомогти?</div>
      </div>

      <div class="input-container">
        <div class="input-wrapper-inner">
          <div class="selected-image-bar hidden" id="selectedImageBar">
            <img id="selectedImagePreview" src="" alt="preview">
            <div class="image-info"><span id="selectedImageName">image.jpg</span></div>
            <button type="button" class="btn-icon" id="removeImageBtn" style="color: var(--danger-text);">✕</button>
          </div>

          <form id="chatForm" class="input-form">
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp" class="hidden">
            <button type="button" class="btn-icon" id="imageBtn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </button>
            <textarea id="prompt" placeholder="Напиши повідомлення..." rows="1"></textarea>
            <button type="button" class="btn-icon hidden" id="stopBtn" style="color: var(--danger-text);">⏹</button>
            <button type="submit" class="send-btn" id="sendBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js?v=12"></script>
</body>
</html>
