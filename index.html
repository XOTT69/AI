<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat BY Антон</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
  />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <h2>Чати</h2>
        <button id="newChatBtn" class="primary-btn small-btn">+ Новий чат</button>
      </div>
      <div id="chatList" class="chat-list"></div>
    </aside>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>AI Chat BY Антон</h1>
          <p id="chatTitle">Новий чат</p>
        </div>
        <div class="topbar-actions">
          <button id="clearBtn" class="ghost-btn">Очистити чат</button>
        </div>
      </header>

      <main id="chat" class="chat"></main>

      <form id="chatForm" class="composer">
        <textarea
          id="prompt"
          placeholder="Напиши повідомлення або опиши, яке зображення згенерувати..."
          rows="1"
          required
        ></textarea>

        <div class="composer-row">
          <div class="left-controls">
            <select id="model">
              <option value="deepseek-ai/deepseek-v4-pro" selected>DeepSeek V4 Pro — Розумний універсал</option>
              <option value="z-ai/glm5.1">GLM-5.1 — Сильний reasoning</option>
              <option value="deepseek-ai/deepseek-v4-flash">DeepSeek V4 Flash — Швидкий</option>
              <option value="meta/llama-3.2-11b-vision-instruct">Llama 3.2 Vision — Фото й OCR</option>
            </select>

            <label class="toggle">
              <input type="checkbox" id="thinking" />
              <span>Thinking</span>
            </label>

            <div class="mode-switch">
              <button type="button" id="fastModeBtn" class="mode-btn active">Швидко</button>
              <button type="button" id="smartModeBtn" class="mode-btn">Розумно</button>
            </div>
          </div>

          <div class="right-controls">
            <input type="file" id="imageInput" accept="image/*" hidden />
            <button type="button" id="imageBtn" class="ghost-btn">Фото</button>
            <button type="button" id="generateImageBtn" class="ghost-btn">Згенерувати фото</button>
            <button type="button" id="stopBtn" class="ghost-btn danger-btn" disabled>Стоп</button>
            <button type="submit" id="sendBtn" class="primary-btn">Надіслати</button>
          </div>
        </div>

        <div id="selectedImageBar" class="selected-image-bar hidden">
          <span id="selectedImageName">Фото не вибрано</span>
          <button type="button" id="removeImageBtn" class="ghost-btn small-btn">Прибрати фото</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.6/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
