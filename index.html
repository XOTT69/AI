<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Chat</title>
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&display=swap" rel="stylesheet">

  <!-- Libs -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script>
    // Unregister old service workers
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }
    // Apply saved theme before paint
    try {
      const saved = JSON.parse(localStorage.getItem('ai-state-v1') || '{}');
      document.documentElement.setAttribute('data-theme', saved.theme || 'dark');
    } catch(e) {}
  </script>

  <link rel="stylesheet" href="/style.css?v=20">
</head>
<body>
  <div class="overlay" id="overlay"></div>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="8" fill="currentColor" opacity="0.1"/>
            <path d="M7 14C7 10.134 10.134 7 14 7C17.866 7 21 10.134 21 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M7 14C7 17.866 10.134 21 14 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            <circle cx="14" cy="14" r="2" fill="currentColor"/>
          </svg>
          <span class="brand-name">AI Chat</span>
        </div>
        <button type="button" class="icon-btn" id="themeToggleBtn" title="Змінити тему" aria-label="Змінити тему">
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>

      <button type="button" class="new-chat-btn" id="newChatBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Новий чат
      </button>

      <div class="chat-list-label">Історія</div>
      <div class="chat-list" id="chatList">
        <div class="chat-list-empty">Немає чатів</div>
      </div>

      <div class="sidebar-bottom">
        <div id="authLoggedOut">
          <button type="button" class="auth-btn" id="googleLoginBtn">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Увійти через Google
          </button>
        </div>
        <div id="authLoggedIn" class="hidden">
          <div class="user-card">
            <img id="userAvatar" src="" alt="" width="32" height="32">
            <div class="user-card-info">
              <div id="userName" class="user-card-name">Користувач</div>
              <div id="userEmail" class="user-card-email">email@example.com</div>
            </div>
          </div>
          <button type="button" class="logout-btn" id="logoutBtn">Вийти</button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="icon-btn hamburger" id="hamburgerBtn" aria-label="Меню">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>

          <div class="model-picker">
            <select id="model" class="model-select" aria-label="Вибір моделі">
              <optgroup label="⚡ Groq — швидко">
                <option value="groq/llama-3.3-70b-versatile">Llama 3.3 70B</option>
                <option value="groq/llama-3.1-8b-instant">Llama 3.1 8B (миттєво)</option>
                <option value="groq/llama-3.2-11b-vision-preview">Llama 3.2 11B Vision 📷</option>
              </optgroup>
              <optgroup label="✦ Cerebras — найшвидше">
                <option value="cerebras/llama-3.3-70b">Llama 3.3 70B (Cerebras)</option>
                <option value="cerebras/llama-3.1-8b">Llama 3.1 8B (Cerebras)</option>
              </optgroup>
              <optgroup label="◆ Google Gemini">
                <option value="gemini/gemini-2.5-flash">Gemini 2.5 Flash 📷</option>
                <option value="gemini/gemini-2.5-pro">Gemini 2.5 Pro 📷</option>
              </optgroup>
              <optgroup label="○ Microsoft / GitHub">
                <option value="github/gpt-4o">GPT-4o 📷</option>
                <option value="github/o4-mini">o4-mini</option>
                <option value="github/phi-4">Phi-4</option>
              </optgroup>
              <optgroup label="▲ Mistral">
                <option value="mistral/mistral-large-latest">Mistral Large</option>
                <option value="mistral/mistral-small-latest">Mistral Small</option>
                <option value="mistral/codestral-latest">Codestral (код)</option>
              </optgroup>
              <optgroup label="◉ NVIDIA">
                <option value="nvidia/llama-3.3-70b-instruct">Llama 3.3 70B (NVIDIA)</option>
                <option value="nvidia/llama-3.2-90b-vision">Llama 3.2 90B Vision 📷</option>
                <option value="nvidia/gemma-3-27b">Gemma 3 27B 📷</option>
              </optgroup>
              <optgroup label="◈ OpenRouter">
                <option value="openrouter/deepseek-r1">DeepSeek R1</option>
                <option value="openrouter/qwen-2.5-72b">Qwen 2.5 72B</option>
              </optgroup>
            </select>
            <svg class="model-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

          <span class="status-dot" id="statusDot"></span>
          <span class="status-text hidden" id="statusText">Генерація...</span>
        </div>

        <div class="topbar-right">
          <button type="button" class="icon-btn" id="clearBtn" title="Очистити чат" aria-label="Очистити чат">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </header>

      <div class="chat-area" id="chat">
        <div class="chat-empty" id="chatEmpty">
          <svg class="chat-empty-icon" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
            <path d="M16 24C16 19.582 19.582 16 24 16C28.418 16 32 19.582 32 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 24C16 28.418 19.582 32 24 32" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
            <circle cx="24" cy="24" r="3" fill="currentColor"/>
          </svg>
          <h2 class="chat-empty-title">Чим можу допомогти?</h2>
          <p class="chat-empty-sub">Обери модель вгорі та напиши запит</p>

          <div class="suggestions">
            <button class="suggestion-chip" data-text="Напиши функцію на JavaScript для сортування масиву обʼєктів">Сортування масиву JS</button>
            <button class="suggestion-chip" data-text="Поясни як працює async/await в JavaScript">async/await</button>
            <button class="suggestion-chip" data-text="Що таке Docker і як ним користуватись?">Що таке Docker?</button>
            <button class="suggestion-chip" data-text="Напиши SQL запит для вибірки топ 10 записів">SQL запит</button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrap">
          <div class="image-preview-bar hidden" id="selectedImageBar">
            <img id="selectedImagePreview" src="" alt="preview" width="40" height="40">
            <span id="selectedImageName" class="image-preview-name">image.jpg</span>
            <button type="button" class="icon-btn small" id="removeImageBtn" aria-label="Видалити фото">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <form id="chatForm" class="input-box">
            <input type="file" id="imageInput" accept="image/png,image/jpeg,image/webp,image/gif" class="sr-only">
            <button type="button" class="icon-btn input-attach" id="imageBtn" title="Прикріпити фото" aria-label="Прикріпити фото">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <textarea id="prompt" placeholder="Напиши повідомлення..." rows="1" aria-label="Повідомлення"></textarea>
            <button type="button" class="stop-btn hidden" id="stopBtn" aria-label="Зупинити">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
            <button type="submit" class="send-btn" id="sendBtn" aria-label="Надіслати">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </form>

          <div class="input-footer">
            <span class="input-hint">Enter — надіслати &nbsp;·&nbsp; Shift+Enter — новий рядок</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js?v=20"></script>
</body>
</html>
