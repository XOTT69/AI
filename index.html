<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>AI Workspace</title>

  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="AI workspace with chat history, multimodal models, sync and clean Vercel deployment." />

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/style.css?v=next" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
</head>
<body>
  <div id="mobileOverlay" class="mobile-overlay"></div>

  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <div class="brand-row">
          <button id="hamburgerCloseBtn" class="icon-btn mobile-only" type="button" aria-label="Закрити меню">✕</button>
          <div class="brand-mark">AI</div>
          <div class="brand-copy">
            <strong>AI Workspace</strong>
            <span>Vercel + Sync</span>
          </div>
        </div>

        <button id="newChatBtn" class="primary-btn" type="button">
          <span>Новий чат</span>
          <span>+</span>
        </button>

        <label class="search-box" for="chatSearch">
          <span>⌕</span>
          <input id="chatSearch" type="text" placeholder="Пошук по чатах" />
        </label>
      </div>

      <div class="sidebar-section-label">Чати</div>
      <div id="chatList" class="chat-list"></div>

      <div class="sidebar-bottom">
        <div id="authLoggedOut" class="auth-card">
          <p>Увійди через Google, щоб зберігати історію в хмарі.</p>
          <button id="googleLoginBtn" class="secondary-btn" type="button">Увійти через Google</button>
        </div>

        <div id="authLoggedIn" class="auth-card hidden">
          <div class="user-row">
            <img id="userAvatar" alt="Avatar" />
            <div class="user-meta">
              <strong id="userName">Користувач</strong>
              <span id="userEmail"></span>
            </div>
          </div>
          <div class="account-actions">
            <button id="settingsBtn" class="ghost-btn" type="button">Налаштування</button>
            <button id="logoutBtn" class="ghost-btn danger" type="button">Вийти</button>
          </div>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="topbar-left">
          <button id="hamburgerBtn" class="icon-btn mobile-only" type="button" aria-label="Відкрити меню">☰</button>
          <div class="topbar-title">
            <h1 id="chatTitle">AI Workspace</h1>
            <span id="statusText" class="status-text hidden">Готово</span>
          </div>
        </div>

        <div class="topbar-actions">
          <select id="model" class="model-select">
            <optgroup label="Fast">
              <option value="groq/llama-3.3-70b-versatile">Llama 3.3 70B · Groq</option>
              <option value="gemini/gemini-2.5-flash">Gemini 2.5 Flash</option>
              <option value="cerebras/llama-3.3-70b">Llama 3.3 70B · Cerebras</option>
            </optgroup>
            <optgroup label="Best">
              <option value="meta/llama-3.3-70b-instruct">Llama 3.3 70B</option>
              <option value="mistral/mistral-large-latest">Mistral Large</option>
              <option value="github/gpt-4o-mini">GPT-4o mini · GitHub</option>
            </optgroup>
            <optgroup label="Reasoning / Coding">
              <option value="qwen/qwen3.5-122b-a10b">Qwen 3.5 122B</option>
              <option value="github/phi-4">Phi-4 · GitHub</option>
              <option value="mistral/codestral-latest">Codestral</option>
            </optgroup>
            <optgroup label="Vision">
              <option value="google/gemma-3-27b-it">Gemma 3 27B</option>
              <option value="meta/llama-3.2-90b-vision-instruct">Llama 3.2 90B Vision</option>
            </optgroup>
          </select>

          <button id="themeToggleBtn" class="icon-btn" type="button" aria-label="Змінити тему">☀️</button>
          <button id="clearBtn" class="icon-btn danger" type="button" aria-label="Очистити чат">⌫</button>
        </div>
      </header>

      <section id="chat" class="chat-feed" aria-live="polite">
        <div class="chat-empty">
          <h2>Готовий до роботи</h2>
          <p>Пиши запит, додавай фото, перемикай моделі та зберігай історію.</p>
        </div>
      </section>

      <section class="composer-shell">
        <div id="selectedImageBar" class="selected-image-bar hidden">
          <img id="selectedImagePreview" alt="Preview" />
          <div class="selected-image-meta">
            <strong id="selectedImageName">image.jpg</strong>
            <span>Зображення буде надіслано разом із повідомленням</span>
          </div>
          <button id="removeImageBtn" class="icon-btn danger" type="button" aria-label="Прибрати зображення">✕</button>
        </div>

        <form id="chatForm" class="composer">
          <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp" class="hidden" />

          <button id="imageBtn" class="icon-btn" type="button" aria-label="Додати зображення">＋</button>

          <textarea
            id="prompt"
            rows="1"
            placeholder="Напиши повідомлення…"
            autocomplete="off"
          ></textarea>

          <button id="stopBtn" class="icon-btn danger hidden" type="button" aria-label="Зупинити генерацію">■</button>
          <button id="sendBtn" class="send-btn" type="submit" aria-label="Надіслати">➤</button>
        </form>
      </section>
    </main>
  </div>

  <script src="/app.js?v=next"></script>
</body>
</html>
