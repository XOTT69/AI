<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover каже Айфону розтягнути фон під чубчик -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Chat Mobile</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-2: #2563eb;
      --danger: #ef4444;
      --border: rgba(255,255,255,.08);
    }

    * { box-sizing: border-box; }
    
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100dvh; /* Динамічна висота для Айфонів */
      overflow: hidden; /* Заборона прокрутки екрану (скролиться тільки чат) */
    }

    .app-container {
      display: flex;
      height: 100dvh;
      width: 100vw;
    }

    /* БОКОВА ПАНЕЛЬ (SIDEBAR) */
    .sidebar {
      width: 280px;
      background: #0f172a;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      /* ФІКС ДЛЯ АЙФОНА: відступи для чубчика і нижньої смужки */
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .chat-item {
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.2s;
    }

    .chat-item:hover { background: rgba(255,255,255,.05); }
    .chat-item.active { background: rgba(59,130,246,.15); border-color: rgba(59,130,246,.5); }

    .chat-item-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-meta { color: var(--muted); font-size: 12px; }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .user-info img { width: 36px; height: 36px; border-radius: 50%; }
    .user-details { overflow: hidden; }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-email { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ГОЛОВНА ЗОНА (MAIN) */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* ВЕРХНЯ ПАНЕЛЬ (TOPBAR) */
    .topbar {
      /* ФІКС ДЛЯ АЙФОНА: додаємо висоту чубчика до верхнього padding */
      padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px 16px;
      background: rgba(11,18,32,.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
      flex-shrink: 0;
    }

    .hamburger-btn {
      display: none;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 26px;
      padding: 6px;
      margin-left: -6px; /* Щоб візуально вирівняти по краю */
      cursor: pointer;
    }

    .chat-header-info { flex: 1; min-width: 0; }
    .chat-header-info h3 { margin: 0; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-indicator { font-size: 12px; color: var(--muted); }

    .topbar-controls { display: flex; align-items: center; gap: 8px; }
    
    .control-btn {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; font-size: 14px; outline: none;
    }

    .mode-toggles { display: flex; background: var(--panel); border-radius: 8px; padding: 2px; border: 1px solid var(--border); }
    .mode-btn { background: transparent; border: none; color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .mode-btn.active { background: var(--panel-2); color: var(--text); }
    .checkbox-label { font-size: 13px; display: flex; align-items: center; gap: 4px; color: var(--muted); cursor: pointer; }

    /* ЧАТ (ПОВІДОМЛЕННЯ) */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch; /* Плавний скрол на iOS */
    }

    .chat-empty { text-align: center; color: var(--muted); margin-top: 40px; font-size: 14px; }
    .message { display: flex; width: 100%; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }

    .message-content {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.user .message-content { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .message.assistant .message-content { background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .message-content p { margin: 0 0 10px 0; }
    .message-content p:last-child { margin: 0; }
    .inline-preview-image { max-width: 100%; border-radius: 8px; margin-top: 8px; }

    /* ПОЛЕ ВВОДУ (INPUT) */
    .input-area {
      padding: 12px 16px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      /* ФІКС ДЛЯ АЙФОНА: підіймаємо над нижньою системною смужкою */
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    }

    .selected-image-bar {
      display: flex; align-items: center; gap: 12px; padding: 8px 12px;
      background: var(--panel); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border);
    }

    .selected-image-bar img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
    .image-info { flex: 1; }
    .image-info span { display: block; font-size: 14px; }
    .image-info small { color: var(--muted); font-size: 12px; }

    .input-form {
      display: flex; align-items: flex-end; gap: 8px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 20px; padding: 6px;
    }

    .btn-icon {
      background: transparent; border: none; color: var(--muted); font-size: 20px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%;
    }
    .btn-icon:hover { background: var(--panel-2); color: var(--text); }

    .input-form textarea {
      flex: 1; background: transparent; border: none; color: var(--text); font-family: inherit;
      font-size: 15px; resize: none; padding: 8px 4px; max-height: 120px; outline: none;
    }

    .send-btn {
      background: var(--accent); color: white; border: none; width: 36px; height: 36px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .send-btn:disabled { background: var(--panel-2); color: var(--muted); }

    .btn {
      background: var(--panel-2); color: var(--text); border: none; padding: 10px 16px;
      border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 8px;
    }
    .btn.primary { background: var(--accent); }
    .btn.danger { background: rgba(239,68,68,.2); color: #fca5a5; }

    .hidden { display: none !important; }

    .mobile-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6);
      z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .mobile-overlay.show { opacity: 1; pointer-events: auto; }

    /* МOБІЛЬНА АДАПТАЦІЯ */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; top: 0; left: 0; height: 100dvh;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,0.5);
      }
      .sidebar.open { transform: translateX(0); }
      .hamburger-btn { display: block; }
      .topbar-controls { display: none; }
      .message-content { max-width: 92%; }
    }
  </style>
</head>
<body>
  
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <div class="app-container">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2 style="margin:0; font-size: 18px;">Мої Чати</h2>
        <button type="button" class="btn-icon" id="closeSidebarBtn" style="display: none;">✕</button>
      </div>

      <div style="padding: 10px;">
        <button type="button" class="btn primary" id="newChatBtn">Новий чат</button>
      </div>

      <div class="chat-list" id="chatList"></div>

      <div class="sidebar-footer">
        <div id="authLoggedOut">
          <button type="button" class="btn" id="googleLoginBtn">Увійти (Google)</button>
        </div>

        <div id="authLoggedIn" class="hidden">
          <div class="user-info">
            <img id="userAvatar" src="https://placehold.co/40x40/png" alt="Avatar">
            <div class="user-details">
              <div id="userName" class="user-name">Користувач</div>
              <div id="userEmail" class="user-email">email@example.com</div>
            </div>
          </div>
          <button type="button" class="btn danger" id="logoutBtn">Вийти</button>
        </div>
      </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <main class="main-content">
      <header class="topbar">
        <button type="button" class="hamburger-btn" id="hamburgerBtn">☰</button>
        
        <div class="chat-header-info">
          <h3 id="chatTitle">Новий чат</h3>
          <span class="status-indicator" id="statusText">Готово</span>
        </div>
        
        <div class="topbar-controls">
          <select id="model" class="control-btn">
            <option value="meta/llama-3.3-70b-instruct">Llama 3.3 70B — Універсальна</option>
            <option value="qwen/qwen3.5-122b-a10b">Qwen 3.5 122B — Розумна</option>
            <option value="google/gemma-3-27b-it">Gemma 3 27B — Фото та OCR</option>
            <option value="abacusai/dracarys-llama-3.1-70b-instruct">Dracarys 70B — Код</option>
          </select>

          <div class="mode-toggles">
            <button type="button" class="mode-btn active" id="fastModeBtn">Швидко</button>
            <button type="button" class="mode-btn" id="smartModeBtn">Розумно</button>
          </div>

          <label class="checkbox-label">
            <input type="checkbox" id="thinking"> Мислення
          </label>
          
          <button type="button" class="control-btn" id="clearBtn" style="color: #fca5a5;">Очистити</button>
        </div>
      </header>

      <div class="chat-container" id="chat">
        <div class="chat-empty">Напишіть повідомлення для початку.</div>
      </div>

      <div class="input-area">
        <div class="selected-image-bar hidden" id="selectedImageBar">
          <img id="selectedImagePreview" src="" alt="preview">
          <div class="image-info">
            <span id="selectedImageName">image.jpg</span>
            <small>Фото прикріплене</small>
          </div>
          <button type="button" class="btn-icon" id="removeImageBtn" style="color: #fca5a5;">✕</button>
        </div>

        <form id="chatForm" class="input-form">
          <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp" class="hidden">
          <button type="button" class="btn-icon" id="imageBtn">🖼️</button>
          <textarea id="prompt" placeholder="Повідомлення..." rows="1"></textarea>
          <button type="button" class="btn-icon hidden" id="stopBtn" style="color: #fca5a5;">⏹</button>
          <button type="submit" class="send-btn" id="sendBtn">➤</button>
        </form>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
